name: Refresh Observatory Dashboards

on:
  # Run every day at 6 AM UTC (adjust timezone as needed)
  schedule:
    - cron: '0 6 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write  # Allow workflow to commit and push history files
  actions: read    # Allow download-artifact to call ListArtifacts API

jobs:
  # Job 1: Discover Projects (MUST run first - other collectors depend on it)
  discover-projects:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create baseline files from secrets
        run: |
          mkdir -p data
          echo "📂 Creating baseline files from GitHub secrets..."

          # Main ADO baseline
          echo '${{ secrets.BASELINE_ADO_MAIN }}' > data/baseline.json

          # Project-specific baselines (if configured)
          # Note: No if-test needed - jq will handle empty input gracefully
          echo '${{ secrets.BASELINE_ADO_PROJECTS }}' | jq -r '.projects[]? | .baseline_file as $file | .baseline_data | "echo '\''\(. | @json)'\'' > data/\($file)"' | bash || true

          echo "✅ Baseline files created"
          ls -la data/*.json 2>/dev/null || echo "⚠️ No baseline files created (secrets may be empty)"

      - name: Create product name mapping from secret (for de-genericization)
        run: |
          echo "🔐 Creating product name mapping from GitHub Secret..."
          echo '${{ secrets.PRODUCT_NAME_MAPPING }}' > .product_mapping.json

          # Verify mapping file was created
          if [ ! -f .product_mapping.json ]; then
            echo "❌ ERROR: Failed to create mapping file"
            exit 1
          fi

          # Verify it's valid JSON (without exposing content)
          if ! python -c "import json; json.load(open('.product_mapping.json'))" 2>/dev/null; then
            echo "❌ ERROR: Mapping file is not valid JSON"
            exit 1
          fi

          echo "✅ Product mapping file created successfully"

      - name: Discover Projects
        env:
          AZURE_DEVOPS_ORG_URL: ${{ secrets.AZURE_DEVOPS_ORG_URL }}
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${PYTHONPATH}"
          python execution/discover_projects.py

      - name: Upload project discovery artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-discovery
          path: .tmp/observatory/ado_structure.json
          retention-days: 1

  # Job 2a: Collect ADO metrics (M-3: ADO secrets only, no ArmorCode secrets)
  collect-ado-metrics:
    needs: discover-projects
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        collector:
          - { name: 'Quality Metrics', script: 'AGENT:quality', outputs: 'quality_history.json' }
          - { name: 'Flow Metrics', script: 'collectors/ado_flow_metrics.py', outputs: 'flow_history.json' }
          - { name: 'Ownership Metrics', script: 'collectors/ado_ownership_metrics.py', outputs: 'ownership_history.json' }
          - { name: 'Risk Metrics', script: 'collectors/ado_risk_metrics.py', outputs: 'risk_history.json' }
          - { name: 'Deployment Metrics', script: 'collectors/ado_deployment_metrics.py', outputs: 'deployment_history.json' }
          - { name: 'Collaboration Metrics', script: 'collectors/ado_collaboration_metrics.py', outputs: 'collaboration_history.json' }
      fail-fast: false  # Continue even if one fails
      max-parallel: 6   # Run all 6 ADO collectors at once

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create baseline files from secrets
        run: |
          mkdir -p data
          echo "📂 Creating baseline files from GitHub secrets..."

          # Main ADO baseline
          echo '${{ secrets.BASELINE_ADO_MAIN }}' > data/baseline.json

          # Project-specific baselines (if configured)
          # Note: No if-test needed - jq will handle empty input gracefully
          echo '${{ secrets.BASELINE_ADO_PROJECTS }}' | jq -r '.projects[]? | .baseline_file as $file | .baseline_data | "echo '\''\(. | @json)'\'' > data/\($file)"' | bash || true

          echo "✅ Baseline files created"
          ls -la data/*.json 2>/dev/null || echo "⚠️ No baseline files created (secrets may be empty)"

      - name: Download project discovery artifact
        uses: actions/download-artifact@v4
        with:
          name: project-discovery
          path: .tmp/observatory/

      - name: Verify project discovery file
        run: |
          if [ -f .tmp/observatory/ado_structure.json ]; then
            echo "✅ Project discovery file found"
            ls -la .tmp/observatory/ado_structure.json
          else
            echo "❌ Project discovery file not found!"
            exit 1
          fi

      - name: Create product name mapping from secret (for de-genericization)
        run: |
          echo "🔐 Creating product name mapping from GitHub Secret..."
          echo '${{ secrets.PRODUCT_NAME_MAPPING }}' > .product_mapping.json

          # Verify mapping file was created
          if [ ! -f .product_mapping.json ]; then
            echo "❌ ERROR: Failed to create mapping file"
            exit 1
          fi

          # Verify it's valid JSON (without exposing content)
          if ! python -c "import json; json.load(open('.product_mapping.json'))" 2>/dev/null; then
            echo "❌ ERROR: Mapping file is not valid JSON"
            exit 1
          fi

          echo "✅ Product mapping file created successfully"

      - name: De-genericize history files (reverse Product A → Real Names)
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${PYTHONPATH}"
          echo "🔓 Converting Product A, B, C back to real product names..."

          # Check if directory and files exist
          echo "📂 Checking .tmp/observatory directory..."
          ls -la .tmp/observatory/*.json 2>&1 | head -10 || echo "⚠️  No JSON files found"

          # Run de-genericization (fail loudly if it fails)
          if ! python scripts/de_genericize_history_files.py; then
            echo "❌ ERROR: De-genericization failed!"
            echo "This means Azure dashboards will show generic names (Product A, B, C) instead of real names."
            echo "Check the de_genericize_history_files.py script for errors."
            exit 1
          fi

          echo "✅ History files now have REAL names - collectors will append with real names"

      - name: Collect ${{ matrix.collector.name }}
        id: collect
        env:
          AZURE_DEVOPS_ORG_URL: ${{ secrets.AZURE_DEVOPS_ORG_URL }}
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${PYTHONPATH}"

          # Check if this is an agent (marked with AGENT: prefix)
          if [[ "${{ matrix.collector.script }}" == AGENT:* ]]; then
            SCRIPT="${{ matrix.collector.script }}"
            AGENT_NAME="${SCRIPT#AGENT:}"
            echo "🤖 Running autonomous agent: $AGENT_NAME"
            python -m agents.run_agent --agent "$AGENT_NAME"
          else
            echo "📊 Running legacy collector: ${{ matrix.collector.script }}"
            python execution/${{ matrix.collector.script }}
          fi

      - name: Upload metrics artifacts
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ matrix.collector.name }}
          path: .tmp/observatory/${{ matrix.collector.outputs }}
          retention-days: 1
        if: steps.collect.outcome == 'success'

  # Job 2b: Collect ArmorCode metrics (M-3: ArmorCode secrets only, no ADO secrets)
  collect-armorcode-metrics:
    needs: discover-projects
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        collector:
          - { name: 'Security Metrics', script: 'armorcode_enhanced_metrics.py', outputs: 'security_history.json' }
          - { name: 'Exploitable Metrics', script: 'collectors/armorcode_exploitable_collector.py', outputs: 'exploitable_*.json' }
      fail-fast: false  # Continue even if one fails
      max-parallel: 2   # Run both ArmorCode collectors at once

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create baseline files from secrets
        run: |
          mkdir -p data
          echo "📂 Creating ArmorCode baseline files from GitHub secrets..."

          # ArmorCode product ID map (from ARMORCODE_ID_MAP secret)
          echo '${{ secrets.ARMORCODE_ID_MAP }}' > data/armorcode_id_map.json

          echo "✅ Baseline files created"
          ls -la data/*.json 2>/dev/null || echo "⚠️ No baseline files created (secrets may be empty)"

      - name: Create product name mapping from secret (for de-genericization)
        run: |
          echo "🔐 Creating product name mapping from GitHub Secret..."
          echo '${{ secrets.PRODUCT_NAME_MAPPING }}' > .product_mapping.json

          # Verify mapping file was created
          if [ ! -f .product_mapping.json ]; then
            echo "❌ ERROR: Failed to create mapping file"
            exit 1
          fi

          # Verify it's valid JSON (without exposing content)
          if ! python -c "import json; json.load(open('.product_mapping.json'))" 2>/dev/null; then
            echo "❌ ERROR: Mapping file is not valid JSON"
            exit 1
          fi

          echo "✅ Product mapping file created successfully"

      - name: De-genericize history files (reverse Product A → Real Names)
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${PYTHONPATH}"
          echo "🔓 Converting Product A, B, C back to real product names..."

          # Check if directory and files exist
          echo "📂 Checking .tmp/observatory directory..."
          ls -la .tmp/observatory/*.json 2>&1 | head -10 || echo "⚠️  No JSON files found"

          # Show sample product names BEFORE de-genericization
          echo "📊 Sample product names BEFORE de-genericization:"
          grep -h "Product [A-Z]" .tmp/observatory/security_history.json 2>/dev/null | head -3 || echo "No generic names found"

          # Run de-genericization (fail loudly if it fails)
          if ! python scripts/de_genericize_history_files.py; then
            echo "❌ ERROR: De-genericization failed!"
            echo "This means Azure dashboards will show generic names (Product A, B, C) instead of real names."
            echo "Check the de_genericize_history_files.py script for errors."
            exit 1
          fi

          # Verify conversion worked
          echo "📊 Sample product names AFTER de-genericization:"
          head -100 .tmp/observatory/security_history.json | grep -E "\"[A-Z][a-z]+ [A-Z]|Eclipse\"" | head -3 || echo "⚠️  WARNING: Still showing generic names!"

          echo "✅ History files now have REAL names - collectors will append with real names"

      - name: Collect ${{ matrix.collector.name }}
        id: collect
        env:
          ARMORCODE_BASE_URL: ${{ secrets.ARMORCODE_BASE_URL }}
          ARMORCODE_API_KEY: ${{ secrets.ARMORCODE_API_KEY }}
          ARMORCODE_ENVIRONMENT: ${{ secrets.ARMORCODE_ENVIRONMENT }}
          ARMORCODE_HIERARCHY: ${{ secrets.ARMORCODE_HIERARCHY }}
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${PYTHONPATH}"

          echo "📊 Running ArmorCode collector: ${{ matrix.collector.script }}"
          python execution/${{ matrix.collector.script }}

      - name: Upload metrics artifacts
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ matrix.collector.name }}
          path: .tmp/observatory/${{ matrix.collector.outputs }}
          retention-days: 1
        if: steps.collect.outcome == 'success'

  # Job 3a: Run intelligence pipeline (feature engineering → forecasting → risk scoring)
  # Depends on both collector jobs; runs in parallel with generate-dashboards.
  # continue-on-error so a first-run ML failure never blocks dashboard deployment.
  run-intelligence:
    needs: [collect-ado-metrics, collect-armorcode-metrics]
    if: always()
    runs-on: ubuntu-22.04
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output directories
        run: mkdir -p data/features data/forecasts data/insights .tmp/observatory/dashboards

      - name: Create baseline files from secrets
        run: |
          mkdir -p data
          echo '${{ secrets.BASELINE_ADO_MAIN }}' > data/baseline.json
          echo '${{ secrets.ARMORCODE_ID_MAP }}' > data/armorcode_id_map.json

      - name: Download all metrics artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: metrics-*
          path: metrics-artifacts/
        continue-on-error: true  # proceed with whatever collectors succeeded

      - name: Organise metrics into .tmp/observatory
        run: |
          find metrics-artifacts -name "*_history.json" -exec cp {} .tmp/observatory/ \; 2>/dev/null || true
          echo "History files available for intelligence pipeline:"
          ls -lh .tmp/observatory/*_history.json 2>/dev/null || echo "  None found"

      - name: Run intelligence pipeline (feature engineering → forecasting → risk scoring)
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${PYTHONPATH}"
          python scripts/run_intelligence_pipeline.py
        continue-on-error: true  # partial output is still useful for dashboards

      - name: Generate intelligence report (template mode — no LLM key required)
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${PYTHONPATH}"
          python scripts/generate_intelligence_report.py \
            --output-dir .tmp/observatory/dashboards
        continue-on-error: true

      - name: Upload intelligence outputs
        uses: actions/upload-artifact@v4
        with:
          name: intelligence-outputs
          path: |
            data/forecasts/
            data/insights/
            data/model_performance.json
            .tmp/observatory/dashboards/intelligence_report_latest.html
          retention-days: 1
        if: always()

  # Job 3b: Generate intelligence dashboards (depends on run-intelligence outputs)
  generate-intelligence-dashboards:
    needs: run-intelligence
    if: always()
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        dashboard:
          - { name: 'Executive Panel',       script: 'executive_panel.py' }
          - { name: 'Predictive Analytics',  script: 'predictive_analytics.py' }
          - { name: 'Model Performance',     script: 'model_performance_dashboard.py' }
          - { name: 'Correlation Heatmap',   script: 'correlation_heatmap.py' }
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create baseline files from secrets
        run: |
          mkdir -p data
          echo '${{ secrets.BASELINE_ADO_MAIN }}' > data/baseline.json
          echo '${{ secrets.ARMORCODE_ID_MAP }}' > data/armorcode_id_map.json

      - name: Download intelligence outputs (forecasts, risk scores, model perf)
        uses: actions/download-artifact@v4
        with:
          name: intelligence-outputs
          path: intelligence-outputs/
        continue-on-error: true  # dashboards render fallback state if absent

      - name: Restore intelligence outputs to expected paths
        run: |
          mkdir -p data/forecasts data/insights
          cp -r intelligence-outputs/data/forecasts/. data/forecasts/ 2>/dev/null || true
          cp -r intelligence-outputs/data/insights/.  data/insights/  2>/dev/null || true
          cp intelligence-outputs/data/model_performance.json data/ 2>/dev/null || true
          echo "Intelligence artifacts restored:"
          ls data/forecasts/ 2>/dev/null | head -5 || echo "  No forecasts"
          ls data/insights/  2>/dev/null | head -5 || echo "  No insights"

      - name: Download metrics artifacts (history files for context-aware dashboards)
        uses: actions/download-artifact@v4
        with:
          pattern: metrics-*
          path: metrics-artifacts/
        continue-on-error: true

      - name: Organise metrics into .tmp/observatory
        run: |
          mkdir -p .tmp/observatory/dashboards
          find metrics-artifacts -name "*_history.json" -exec cp {} .tmp/observatory/ \; 2>/dev/null || true

      - name: Generate ${{ matrix.dashboard.name }} Dashboard
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${PYTHONPATH}"
          python execution/dashboards/${{ matrix.dashboard.script }}
        continue-on-error: true

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-${{ matrix.dashboard.name }}
          path: .tmp/observatory/dashboards/
          retention-days: 1
        if: always()

  # Job 3c: Generate all legacy dashboards in parallel
  generate-dashboards:
    needs: [collect-ado-metrics, collect-armorcode-metrics]
    if: always()  # Run even if collector jobs fail
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        dashboard:
          - { name: 'Quality', script: 'quality.py' }
          - { name: 'Flow', script: 'flow.py' }
          - { name: 'Ownership', script: 'ownership.py' }
          - { name: 'Risk', script: 'risk.py' }
          - { name: 'Deployment', script: 'deployment.py' }
          - { name: 'Collaboration', script: 'collaboration.py' }
          - { name: 'Security', script: 'security_enhanced.py' }
          - { name: 'Exploitable', script: 'exploitable_dashboard.py' }
          - { name: 'Targets', script: 'targets.py' }
          - { name: 'Trends', script: '../generate_trends_dashboard.py' }
          - { name: 'Launcher', script: '../generate_dashboard_launcher.py' }
      fail-fast: false
      max-parallel: 11

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create baseline files from secrets
        run: |
          mkdir -p data
          echo "📂 Creating baseline files from GitHub secrets..."

          # Main ADO baseline
          echo '${{ secrets.BASELINE_ADO_MAIN }}' > data/baseline.json

          # ArmorCode product ID map (from ARMORCODE_ID_MAP secret)
          echo '${{ secrets.ARMORCODE_ID_MAP }}' > data/armorcode_id_map.json

          # Project-specific baselines (if configured)
          # Note: No if-test needed - jq will handle empty input gracefully
          echo '${{ secrets.BASELINE_ADO_PROJECTS }}' | jq -r '.projects[]? | .baseline_file as $file | .baseline_data | "echo '\''\(. | @json)'\'' > data/\($file)"' | bash || true

          echo "✅ Baseline files created"
          ls -la data/*.json 2>/dev/null || echo "⚠️ No baseline files created (secrets may be empty)"

      - name: Download ALL metrics artifacts (REQUIRED - no fallback!)
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
        continue-on-error: false

      - name: Verify fresh metrics available
        run: |
          echo "🔍 Verifying fresh metrics artifacts are available..."
          if [ ! -d "artifacts" ] || [ -z "$(ls -A artifacts 2>/dev/null)" ]; then
            echo "❌ ERROR: No fresh metrics artifacts found!"
            echo "Cannot generate dashboards with real product names without fresh data."
            echo "This prevents falling back to genericized data from git."
            exit 1
          fi

          echo "✅ Fresh metrics artifacts found:"
          ls -la artifacts/

      - name: Use ONLY fresh metrics (ignore genericized git history)
        run: |
          # Create output directory
          mkdir -p .tmp/observatory

          # Copy ONLY fresh artifacts with REAL product names
          echo "📦 Using fresh metrics with REAL product names..."
          find artifacts -name "*.json" -exec cp -v {} .tmp/observatory/ \;

          echo ""
          echo "✅ Fresh history files ready for dashboard generation:"
          ls -lh .tmp/observatory/*.json
          echo ""
          echo "🔒 These contain REAL product names (de-genericized + fresh appended data)"

      - name: Verify metrics data available
        id: verify
        run: |
          # Check for the specific history file this dashboard needs
          DASHBOARD_NAME="${{ matrix.dashboard.name }}"

          # Map dashboard names to their required history files
          case "$DASHBOARD_NAME" in
            "Quality")
              REQUIRED_FILE="quality_history.json"
              ;;
            "Flow")
              REQUIRED_FILE="flow_history.json"
              ;;
            "Ownership")
              REQUIRED_FILE="ownership_history.json"
              ;;
            "Risk")
              REQUIRED_FILE="risk_history.json"
              ;;
            "Deployment")
              REQUIRED_FILE="deployment_history.json"
              ;;
            "Collaboration")
              REQUIRED_FILE="collaboration_history.json"
              ;;
            "Security")
              REQUIRED_FILE="security_history.json"
              ;;
            "Exploitable")
              REQUIRED_FILE="exploitable_history.json"
              ;;
            "Targets"|"Executive")
              # These dashboards aggregate all history files
              REQUIRED_FILE="quality_history.json"  # Just check if any exists
              ;;
            *)
              echo "⚠️  Unknown dashboard type"
              exit 0
              ;;
          esac

          if [ -f ".tmp/observatory/$REQUIRED_FILE" ]; then
            echo "✅ Required history file found: $REQUIRED_FILE"
            ls -lh ".tmp/observatory/$REQUIRED_FILE"
          else
            echo "❌ Required history file not found: $REQUIRED_FILE"
            echo "⚠️  Dashboard generation may fail or show incomplete data"
            exit 1
          fi

      - name: Generate ${{ matrix.dashboard.name }} Dashboard
        if: steps.verify.outcome == 'success'
        env:
          AZURE_DEVOPS_ORG_URL: ${{ secrets.AZURE_DEVOPS_ORG_URL }}
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
          ARMORCODE_BASE_URL: ${{ secrets.ARMORCODE_BASE_URL }}
          ARMORCODE_API_KEY: ${{ secrets.ARMORCODE_API_KEY }}
          ARMORCODE_ENVIRONMENT: ${{ secrets.ARMORCODE_ENVIRONMENT }}
          ARMORCODE_HIERARCHY: ${{ secrets.ARMORCODE_HIERARCHY }}
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${PYTHONPATH}"
          python execution/dashboards/${{ matrix.dashboard.script }}

      - name: Upload dashboard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-${{ matrix.dashboard.name }}
          path: .tmp/observatory/dashboards/
          retention-days: 1
        if: success()

      - name: Upload patched security history (live-accurate count for index.html)
        uses: actions/upload-artifact@v4
        with:
          name: security-history-patched
          path: .tmp/observatory/security_history.json
          retention-days: 1
        if: matrix.dashboard.name == 'Security' && success()

  # Job 4: Deploy to Azure Static Web Apps
  deploy-to-azure:
    needs: [generate-dashboards, generate-intelligence-dashboards]
    if: always()  # Run even if some dashboards fail
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download all dashboard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dashboard-*
          path: dashboard-artifacts/
          merge-multiple: true

      - name: Download fresh metrics artifacts (REQUIRED for git commit)
        uses: actions/download-artifact@v4
        with:
          pattern: metrics-*
          path: metrics-artifacts/
        continue-on-error: false

      - name: Apply patched security history (live-accurate count overrides collector)
        uses: actions/download-artifact@v4
        with:
          name: security-history-patched
          path: metrics-artifacts/metrics-Security Metrics/
        continue-on-error: false  # Fail loudly if patch unavailable — prevents stale/corrupt counts reaching index.html

      - name: Verify and merge fresh metrics
        run: |
          mkdir -p .tmp/observatory

          # Verify fresh metrics are available
          if [ ! -d "metrics-artifacts" ] || [ -z "$(find metrics-artifacts -name '*_history.json' 2>/dev/null)" ]; then
            echo "❌ ERROR: No fresh metrics artifacts found for git commit!"
            echo "Cannot commit history without fresh data."
            exit 1
          fi

          # Copy fresh history files with REAL product names
          echo "📦 Merging fresh metrics with REAL product names..."
          find metrics-artifacts -name "*_history.json" -exec cp -v {} .tmp/observatory/ \;

          echo ""
          echo "✅ Fresh history files ready for genericization and commit:"
          ls -lh .tmp/observatory/*_history.json

      - name: Install analytics dependencies
        run: pip install numpy scikit-learn

      - name: Write ArmorCode ID map for per-product security alerts
        run: echo '${{ secrets.ARMORCODE_ID_MAP }}' > data/armorcode_id_map.json

      - name: Build analytics database and run alerting
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${PYTHONPATH}"
          echo "📊 Importing metrics into SQLite analytics database..."
          python execution/import_to_sqlite.py
          echo "🔔 Running anomaly detection and alert engine..."
          python -c "
          from pathlib import Path
          from execution.ml.alert_engine import AlertEngine
          engine = AlertEngine(db_path=Path('.tmp/observatory/observatory.db'))
          total = engine.run()
          alerts = engine.load_alerts()
          print(f'✅ {total} alerts generated')
          if alerts:
              print('Active alerts:')
              for a in alerts[:10]:
                  print(f'  [{a.severity.upper()}] {a.dashboard}/{a.project_name} {a.metric_name}: {a.message}')
          else:
              print('  No alerts — all metrics within normal range')
          "
        continue-on-error: true  # Alerting failure must not block deployment

      - name: Prepare deployment directory
        run: |
          mkdir -p .tmp/observatory/dashboards

          # Copy all dashboard HTML files (artifacts contain full .tmp path)
          if [ -d "dashboard-artifacts" ]; then
            find dashboard-artifacts -name "*.html" -exec cp {} .tmp/observatory/dashboards/ \;
            echo "✅ Dashboards prepared for deployment"
            ls -la .tmp/observatory/dashboards/
          else
            echo "⚠️  No dashboards found, deployment will be empty"
          fi

      - name: Download intelligence outputs (report + updated model_performance.json)
        uses: actions/download-artifact@v4
        with:
          name: intelligence-outputs
          path: intelligence-outputs/
        continue-on-error: true  # don't block deploy if intelligence pipeline failed

      - name: Copy intelligence report and update model_performance.json
        run: |
          # Copy intelligence report to deployment directory (if generated)
          if [ -f "intelligence-outputs/.tmp/observatory/dashboards/intelligence_report_latest.html" ]; then
            cp intelligence-outputs/.tmp/observatory/dashboards/intelligence_report_latest.html \
               .tmp/observatory/dashboards/
            echo "✅ intelligence_report_latest.html added to deployment"
          else
            echo "ℹ️  No intelligence report generated this run (template fallback may apply)"
          fi

          # Update committed model_performance.json with latest MAPE scores
          if [ -f "intelligence-outputs/data/model_performance.json" ]; then
            cp intelligence-outputs/data/model_performance.json data/model_performance.json
            echo "✅ model_performance.json updated from intelligence pipeline"
          fi

      - name: Regenerate Trends dashboard with accurate security count
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${PYTHONPATH}"
          echo "📊 Regenerating Trends dashboard using patched security history..."
          python execution/generate_trends_dashboard.py
          echo "✅ Trends dashboard regenerated — overwrites Job 3 version with accurate count"

      - name: Validate authentication config (REQUIRED)
        run: |
          echo "🔒 Validating Azure AD authentication configuration..."

          # SECURITY: Fail fast if auth config missing (prevent public dashboard deployment)
          if [ ! -f "staticwebapp.config.json" ]; then
            echo "❌ FATAL: staticwebapp.config.json not found!"
            echo "Cannot deploy dashboards without authentication config."
            echo "This would expose sensitive organizational metrics to the public internet."
            exit 1
          fi

          # Validate config requires authentication
          if ! jq -e '.routes[0].allowedRoles | contains(["authenticated"])' staticwebapp.config.json > /dev/null 2>&1; then
            echo "❌ FATAL: Authentication not enforced in staticwebapp.config.json"
            echo "Config must require 'authenticated' role for all routes."
            exit 1
          fi

          echo "✅ Authentication config validated"
          cp staticwebapp.config.json .tmp/observatory/dashboards/
          echo "✅ Authentication config copied to deployment"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: ".tmp/observatory/dashboards"
          skip_app_build: true
          skip_api_build: true
          # production_branch ensures that:
          #   main → production URL (your current users)
          #   any other branch (e.g. phase-b-intelligence) → staging preview URL
          # Scheduled runs always use main (GitHub platform guarantee), so they
          # always deploy to production. Manual triggers from feature branches
          # deploy to a separate staging URL that Azure creates automatically.
          production_branch: main

      - name: Deployment Complete
        run: |
          echo "✅ Dashboards deployed successfully to Azure Static Web Apps!"
          echo "🔒 Access is now protected with Azure AD authentication"
          echo "🌐 Your team can access at: https://${{ secrets.AZURE_STATIC_WEB_APP_NAME }}.azurestaticapps.net/"

      - name: Create forward mapping from secret (for genericization)
        run: |
          echo "🔐 Creating forward product mapping from GitHub Secret..."
          echo '${{ secrets.PRODUCT_NAME_MAPPING_FORWARD }}' > .product_mapping_forward.json

          # Verify mapping file was created and is valid JSON
          if [ ! -f .product_mapping_forward.json ]; then
            echo "❌ ERROR: Failed to create forward mapping file"
            exit 1
          fi

          if ! python -c "import json; json.load(open('.product_mapping_forward.json'))" 2>/dev/null; then
            echo "❌ ERROR: Forward mapping file is not valid JSON"
            exit 1
          fi

          echo "✅ Forward product mapping file created successfully"

      - name: Genericize History Files Before Commit
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}:${PYTHONPATH}"
          echo "🔒 Genericizing product names in history files for public repo..."

          if ! python scripts/genericize_history_files.py; then
            echo "❌ ERROR: Genericization failed!"
            echo "Cannot commit history files without genericization (security risk)"
            exit 1
          fi

          echo "✅ History files genericized successfully"

      - name: Validate History Files Before Commit
        run: |
          echo "🔍 Validating history files before committing..."
          python -c "
          import json
          import sys
          from pathlib import Path

          history_files = list(Path('.tmp/observatory').glob('*_history.json'))
          valid_files = []
          invalid_files = []

          for file in history_files:
              try:
                  with open(file, 'r') as f:
                      data = json.load(f)

                  # Check basic structure
                  if not isinstance(data, dict) or 'weeks' not in data:
                      invalid_files.append(f'{file.name}: Invalid structure')
                      continue

                  # Check if weeks array has data
                  if not data['weeks']:
                      invalid_files.append(f'{file.name}: Empty weeks array')
                      continue

                  valid_files.append(file.name)
                  print(f'✓ {file.name}: Valid ({len(data[\"weeks\"])} weeks)')
              except Exception as e:
                  invalid_files.append(f'{file.name}: {e}')

          if invalid_files:
              print('\n⚠️  Invalid history files found:')
              for f in invalid_files:
                  print(f'  - {f}')
              print('\nThese files will NOT be committed.')

          if not valid_files:
              print('\n❌ No valid history files to commit!')
              sys.exit(1)

          print(f'\n✅ {len(valid_files)} valid history files ready to commit')
          "

      - name: Commit Genericized History Files to Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage FIRST (before any pull) to avoid "unstaged changes" error
          git add -f .tmp/observatory/*_history.json
          # Also commit updated model performance MAPE scores (non-sensitive)
          git add -f data/model_performance.json 2>/dev/null || true

          if ! git diff --staged --quiet; then
            echo "📝 Committing genericized history files..."
            git commit -m "Update metrics history (genericized) - $(date +'%Y-%m-%d')"
            # Pull with rebase after committing; -X ours prefers our fresh data on conflict
            git pull --rebase -X ours
            git push
            echo "✅ History files committed and pushed to public repo"
          else
            echo "ℹ️  No changes to commit"
          fi
